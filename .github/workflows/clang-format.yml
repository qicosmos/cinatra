name: Clang Format Diff

on:
  push:
    branches:
      - main
      - master
      - coro_http_server
  pull_request:
    branches:
      - main
      - master
      - coro_http_server

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: install clang-format
        run:  sudo apt install clang-format
      - name: check-diff
        run: |
          changed=$(git diff --name-only HEAD^ HEAD | grep -E '\.(cpp|hpp|h|cc|cxx)$' || true)
          if [ -z "$changed" ]; then
            echo "No C/C++ files changed, skipping format check."
            exit 0
          fi
          echo "$changed" | xargs clang-format --dry-run --Werror
