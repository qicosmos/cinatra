name: Clang Format Diff

on:
  push:
    branches:
      - main
      - master
      - coro_http_server
  pull_request:
    branches:
      - main
      - master
      - coro_http_server

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: install clang-format-18
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-18 main"
          sudo apt-get update
          sudo apt-get install -y clang-format-18
          clang-format-18 --version
      - name: check-diff
        run: |
          changed=$(git diff --name-only HEAD^ HEAD | grep -E '\.(cpp|hpp|h|cc|cxx)$' || true)
          if [ -z "$changed" ]; then
            echo "No C/C++ files changed, skipping format check."
            exit 0
          fi
          echo "$changed" | xargs clang-format-18 --dry-run --Werror
